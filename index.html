            "@type": "Question",
            "name": "Will my website work on mobile devices?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. Every website we build is designed and tested to work perfectly on phones, tablets, and desktops. Mobile usability is built in from the start, not added later." }

            "name": "Do you handle SEO?",

          },

            "@type": "Question",
            "name": "Can you redesign my existing website?",
            "acceptedAnswer": { "@type": "Answer", "text": "Absolutely. We can audit your current site, identify issues with design, speed, or structure, and create a modern redesign that improves performance and user experience." }
          },

            "@type": "Question",
            "name": "What happens after the website launches?",
            "acceptedAnswer": { "@type": "Answer", "text": "We provide initial support during launch and are available for ongoing maintenance plans. You can choose to handle updates yourself or have us manage them. We're here to help however you need." }
          },

            "@type": "Question",
            "name": "Can you help with integrations like payment systems or booking tools?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. We can integrate WhatsApp, email forms, Google Analytics, payment gateways, booking systems, and other tools depending on your needs." }
          },
          {
            "@type": "Question",
            "name": "What if I need changes after launch?",
            "acceptedAnswer": { "@type": "Answer", "text": "That's normal. Small updates are straightforward and quick. We offer maintenance plans for regular updates, or you can request changes as needed. We keep communication clear and simple." }
